<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/dashboard.css') }}">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Library<br>Management<br>System</h2>

        <a href="{{ url_for('dashboard') }}">Add Book</a>
        <a href="{{ url_for('book_report') }}">Book Report</a>
        <a href="{{ url_for('book_request') }}">Book Request</a>
        <a href="{{ url_for('request_report') }}">Request Report</a>
        <a href="{{ url_for('add_student_page') }}">Add Student</a>
        <a href="{{ url_for('student_report') }}">Student Report</a>
        <a href="{{ url_for('issued_books') }}">Issued Books</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="main">
        <h1>Welcome to Library Management System Dashboard</h1>

        <form class="book-form" method="POST" action="{{ url_for('add_book') }}">

            <input type="text" name="book_name" placeholder="Book Name" required>
            <input type="text" name="author" placeholder="Author" required>
            <input type="text" name="publication" placeholder="Publication" required>

            <select name="branch" required>
                <option value="">Select Branch</option>
                <option>Computer Science</option>
                <option>Mechanical</option>
                <option>Civil</option>
                <option>Electrical</option>
            </select>

            <input type="number" name="price" placeholder="Price (₹)" required>
            <input type="number" name="quantity" placeholder="Quantity" required>

            <button type="submit">Submit Book</button>
        </form>
    </div>

</div>

</body>
</html>
