<!DOCTYPE html>
<html>
<head>
    <title>Book Request</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/dashboard.css') }}">
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Library<br>Management<br>System</h2>

        <a href="{{ url_for('dashboard') }}">Add Book</a>
        <a href="{{ url_for('book_report') }}">Book Report</a>
        <a href="{{ url_for('book_request') }}">Book Request</a>
        <a href="{{ url_for('request_report') }}">Request Report</a>
        <a href="{{ url_for('add_student_page') }}">Add Student</a>
        <a href="{{ url_for('student_report') }}">Student Report</a>
        <a href="{{ url_for('issued_books') }}">Issued Books</a>
        <a href="{{ url_for('logout') }}">Logout</a>
    </div>

    <div class="main">
        <h1>Book Request</h1>

        <form method="POST">
            <label>Select Student</label>
                <select name="student_name" required>
                    <option value="">Select Student</option>
                    {% for student in students %}
                        <option value="{{ student.student_name }}">
                            {{ student.student_name }} ({{ student.roll_no }})
                        </option>
                    {% endfor %}
                </select>
                
            <label>Select Book</label>
            <select name="book_name" required>
                <option value="">Select Book</option>
                {% for b in books %}
                <option value="{{ b.book_name }}">{{ b.book_name }}</option>
                {% endfor %}
            </select>

            <button type="submit">Request Book</button>
        </form>
    </div>
</div>

</body>
</html>
